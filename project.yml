name: JPad

options:
  minimumXcodeGenVersion: 2.38.0
  defaultConfig: Debug
  developmentLanguage: en
  knownRegions:
    - en
    - ja
    - Base
  deploymentTarget:
    iOS: "17.0"

packages:
  TinyToneCore:
    path: ../tinytone/Packages/TinyToneCore

targets:
  JPad:
    type: application
    platform: iOS
    sources:
      - path: JPad
        excludes:
          - PresetBundles
          - Resources
          - Services/Audio/TinyTonePatch.swift
          - Services/Audio/TinyToneFactoryPresets.swift
          - Services/Audio/TinyToneMetrics.swift
          - Services/Audio/TinyToneJSONService.swift
      - path: JPad/PresetBundles
        type: folder
        buildPhase: resources
      - path: JPad/Resources/jcstore-manifest.json
        buildPhase: resources
      - path: JPad/Resources/FactoryPresets
        buildPhase: resources
      - path: JPad/Resources/Assets.xcassets
      - path: JPad/Resources/en.lproj
        buildPhase: resources
      - path: JPad/Resources/ja.lproj
        buildPhase: resources
    dependencies:
      - package: TinyToneCore
    settings:
      base:
        # Same App Store app as JChord — do not reset CURRENT_PROJECT_VERSION / bundle ID.
        PRODUCT_BUNDLE_IDENTIFIER: com.flickerproduct.jchord
        PRODUCT_NAME: JPad
        MARKETING_VERSION: 1.1.05
        CURRENT_PROJECT_VERSION: 126
        SWIFT_VERSION: 6.0
        DEVELOPMENT_TEAM: G942ZU3CGC
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: JPad/JPad.entitlements
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: JPad/Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: JPad
        INFOPLIST_KEY_CFBundleName: JPad
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIRequiresFullScreen: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        TARGETED_DEVICE_FAMILY: 1,2
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
