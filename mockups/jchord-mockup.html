<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>JChord Mockup</title>
  <style>
    :root {
      --bg: #0c111a;
      --bg-soft: #121826;
      --panel: rgba(17, 24, 38, 0.84);
      --panel-strong: rgba(20, 28, 43, 0.96);
      --panel-border: rgba(255, 255, 255, 0.08);
      --surface: rgba(22, 30, 47, 0.82);
      --surface-border: rgba(255, 255, 255, 0.08);
      --pad-bg: linear-gradient(145deg, rgba(30, 40, 61, 0.98), rgba(21, 30, 48, 0.96));
      --pad-border: rgba(255, 255, 255, 0.12);
      --pad-pressed-bg: linear-gradient(145deg, rgba(56, 63, 78, 0.98), rgba(36, 42, 54, 0.98));
      --pad-pressed-border: rgba(255, 255, 255, 0.18);
      --text: #e6ebf4;
      --muted: rgba(230, 235, 244, 0.8);
      --red: #e9edf5;
      --blue: #e9edf5;
      --track: #293040;
      --track-fill: #c7ceda;
      --shadow: 0 18px 44px rgba(0, 0, 0, 0.38);
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.06), transparent 32%),
        radial-gradient(circle at top right, rgba(255, 255, 255, 0.05), transparent 26%),
        linear-gradient(180deg, #0d131d, #090d14 72%, #070b11);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      padding: 24px;
    }

    .page {
      max-width: 1600px;
      margin: 0 auto;
      display: grid;
      gap: 18px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .title {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 0.02em;
      margin: 0;
    }

    .tabs {
      display: inline-flex;
      gap: 8px;
      padding: 6px;
      border-radius: 999px;
      background: rgba(14, 20, 31, 0.78);
      box-shadow: var(--shadow);
      border: 1px solid rgba(255,255,255,0.06);
    }

    .tab {
      border: 0;
      border-radius: 999px;
      padding: 10px 16px;
      font-weight: 700;
      background: transparent;
      color: #8f98aa;
      cursor: pointer;
    }

    .tab.active {
      background: linear-gradient(180deg, rgba(255,255,255,0.12), rgba(255,255,255,0.06));
      color: var(--text);
      box-shadow: 0 8px 18px rgba(0,0,0,0.22);
    }

    .mockup-shell {
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
    }

    .artboard {
      background: transparent;
      backdrop-filter: none;
      border: 0;
      box-shadow: none;
      border-radius: 0;
      padding: 0;
      overflow: hidden;
    }

    .artboard.hidden {
      display: none;
    }

    .device {
      margin: 0 auto;
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.04), transparent 30%),
        linear-gradient(180deg, var(--bg-soft), var(--bg));
      border-radius: 26px;
      padding: 18px 18px 22px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
    }

    .device.portrait {
      width: min(420px, 100%);
      --pad-columns: 3;
      --pad-gap: 10px;
    }

    .device.landscape {
      width: min(960px, 100%);
      --pad-columns: 6;
      --pad-gap: 11px;
    }

    .safe-top {
      height: 22px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(230, 235, 244, 0.72);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    .top-label {
      width: 100%;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 12px;
      font-weight: 800;
      letter-spacing: 0.01em;
      margin: 0 0 10px;
      padding: 0 2px 4px;
      border-radius: 0;
      background: transparent;
      border: 0;
      box-shadow: none;
    }

    .output-name {
      text-align: center;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 0.1em;
      color: var(--text);
    }

    .top-action {
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      border-radius: 14px;
      min-width: 42px;
      height: 32px;
      padding: 0 12px;
      font-size: 13px;
      font-weight: 800;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .top-action.icon {
      width: 60px;
      min-width: 60px;
      height: 60px;
      padding: 0;
      font-size: 39px;
      line-height: 1;
      border: 0;
      background: transparent;
    }

    .grid {
      display: grid;
      gap: var(--grid-gap);
      margin-bottom: 18px;
    }

    .portrait .grid {
      --grid-gap: var(--pad-gap);
      grid-template-columns: repeat(3, 1fr);
    }

    .landscape .grid {
      --grid-gap: var(--pad-gap);
      grid-template-columns: repeat(6, 1fr);
    }

    .pad {
      aspect-ratio: 1 / 1;
      border-radius: 18px;
      padding: 12px;
      background: var(--pad-bg);
      border: 2px solid var(--pad-border);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow: hidden;
    }

    .pad.press {
      background: var(--pad-pressed-bg);
      border-color: var(--pad-pressed-border);
      color: white;
    }

    .pad.press .pad-name,
    .pad.press .pad-root {
      color: rgba(255,255,255,0.92);
    }

    .pad-name {
      font-size: clamp(18px, 1.8vw, 28px);
      font-weight: 800;
      line-height: 1.05;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .pad-root {
      font-size: clamp(12px, 1vw, 16px);
      color: rgba(230, 235, 244, 0.5);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .controls {
      display: grid;
      gap: 18px;
      padding-top: 6px;
    }

    .controls-row {
      display: grid;
      gap: 14px;
    }

    .label-line {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      font-weight: 700;
      color: var(--muted);
      font-size: 17px;
    }

    .velocity-readout {
      text-align: right;
      font-weight: 700;
      font-size: 16px;
      color: var(--muted);
      margin-top: 0;
    }

    .slider {
      width: 100%;
      appearance: none;
      height: 8px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--track-fill) 0 28%, var(--track) 28% 100%);
      outline: none;
    }

    .slider::-webkit-slider-thumb {
      appearance: none;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #f3f6ff;
      border: 1px solid rgba(0,0,0,0.08);
      box-shadow: 0 8px 16px rgba(0,0,0,0.24);
      cursor: pointer;
    }

    .slider::-moz-range-thumb {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #f3f6ff;
      border: 1px solid rgba(0,0,0,0.08);
      box-shadow: 0 8px 16px rgba(0,0,0,0.24);
      cursor: pointer;
    }

    .noteoff-wrap {
      display: flex;
      justify-content: center;
      gap: 10px;
    }

    .noteoff {
      width: calc((100% - (var(--pad-columns) - 1) * var(--pad-gap)) / var(--pad-columns));
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 16px;
      background: var(--pad-bg);
      color: var(--text);
      font-weight: 800;
      letter-spacing: 0.02em;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
      user-select: none;
    }

    .noteoff.subtle {
      background: linear-gradient(145deg, rgba(38, 44, 58, 0.98), rgba(28, 33, 44, 0.98));
      color: rgba(255, 255, 255, 0.9);
    }

    .noteoff {
      height: 52px;
      font-size: 20px;
    }

    .legend {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      color: #697080;
      font-size: 13px;
      padding-left: 4px;
    }

    .editor {
      display: grid;
      gap: 14px;
      grid-template-columns: 1fr;
      align-items: start;
    }

    .editor-card {
      background: var(--panel-strong);
      border: 1px solid var(--surface-border);
      border-radius: 22px;
      padding: 18px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.22);
    }

    .editor-header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .editor-title {
      font-size: 22px;
      font-weight: 800;
      margin: 0;
      text-align: center;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      color: #b8cbff;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.03em;
      white-space: nowrap;
    }

    .field-label {
      display: block;
      font-size: 13px;
      font-weight: 800;
      color: var(--muted);
      margin: 0 0 8px;
      letter-spacing: 0.02em;
    }

    .field-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 0 0 8px;
    }

    .field-actions {
      display: inline-flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .field-action {
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.04);
      color: var(--muted);
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.04em;
    }

    .field-action.active {
      background: rgba(255, 255, 255, 0.12);
      color: white;
      border-color: transparent;
    }

    .settings-layout {
      display: grid;
      gap: 14px;
      align-items: start;
    }

    .settings-card {
      background: var(--panel-strong);
      border: 1px solid var(--surface-border);
      border-radius: 22px;
      padding: 18px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.22);
    }

    .settings-title {
      margin: 0 0 14px;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 0.04em;
    }

    .settings-top {
      display: grid;
      gap: 10px;
    }

    .setting-label {
      font-size: 13px;
      font-weight: 800;
      color: var(--muted);
      letter-spacing: 0.02em;
      margin: 0;
    }

    .segmented {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      padding: 6px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 18px;
    }

    .segment {
      width: 100%;
      border: 0;
      background: transparent;
      color: var(--text);
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 0.04em;
    }

    .segment.active {
      background: rgba(255, 255, 255, 0.14);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
    }

    .device-list {
      display: grid;
      gap: 8px;
    }

    .device-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.05);
      border-radius: 14px;
      padding: 12px 14px;
      font-weight: 800;
    }

    .device-item.active {
      background: rgba(255, 255, 255, 0.12);
    }

    .device-meta {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .settings-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    .setting-block {
      display: grid;
      gap: 10px;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .toggle-row .segmented {
      min-width: 170px;
      flex: 0 0 auto;
    }

    .toggle-row .segment {
      min-width: 0;
      width: 100%;
    }

    .test-note-meta {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .settings-shell {
      width: min(100%, 560px);
    }

    .toggle {
      width: 70px;
      height: 36px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 3px;
      display: flex;
      align-items: center;
      justify-content: flex-start;
    }

    .toggle.on {
      justify-content: flex-end;
    }

    .toggle-thumb {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #f3f6ff;
      box-shadow: 0 8px 16px rgba(0,0,0,0.24);
    }

    .status-line {
      font-size: 16px;
      font-weight: 800;
      color: var(--text);
    }

    .mini-readout {
      font-size: 14px;
      font-weight: 800;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    .settings-note {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }

    .text-input {
      width: 100%;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 14px 16px;
      font-size: 22px;
      font-weight: 800;
      color: var(--text);
      background: rgba(255, 255, 255, 0.04);
      outline: none;
    }

    .text-input::placeholder {
      color: #7f899a;
    }

    .suggestion-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 8px;
      align-items: flex-start;
    }

    .suggestion {
      width: auto;
      min-width: 0;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
      border-radius: 14px;
      padding: 6px 12px;
      font-weight: 700;
      font-size: 12px;
      line-height: 1.05;
      min-height: 30px;
      white-space: nowrap;
      flex: 0 0 auto;
    }

    .suggestion.primary {
      background: rgba(255, 255, 255, 0.12);
      color: white;
      border-color: transparent;
    }

    .channel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
    }

    .channel-picker {
      position: relative;
      width: 180px;
      height: 146px;
      overflow-y: auto;
      scroll-snap-type: y mandatory;
      padding: 46px 0;
      scrollbar-width: none;
      overscroll-behavior: contain;
    }

    .channel-picker::-webkit-scrollbar {
      display: none;
    }

    .channel-picker::before,
    .channel-picker::after {
      content: "";
      position: sticky;
      left: 0;
      right: 0;
      height: 46px;
      display: block;
      pointer-events: none;
      z-index: 1;
    }

    .channel-picker::before {
      top: 0;
      margin-bottom: -46px;
      background: linear-gradient(180deg, rgba(24, 29, 41, 0.98) 0%, rgba(24, 29, 41, 0) 100%);
    }

    .channel-picker::after {
      bottom: 0;
      margin-top: -46px;
      background: linear-gradient(0deg, rgba(24, 29, 41, 0.98) 0%, rgba(24, 29, 41, 0) 100%);
    }

    .channel-picker-inner {
      display: grid;
      gap: 8px;
      position: relative;
      z-index: 0;
    }

    .channel-row {
      width: 100%;
      min-height: 30px;
      border-radius: 13px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      background: rgba(255, 255, 255, 0.035);
      color: var(--text);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.03em;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 14px;
      user-select: none;
      scroll-snap-align: center;
      transform: scale(0.96);
      opacity: 0.48;
      transition: transform 0.18s ease, opacity 0.18s ease, background 0.18s ease;
    }

    .channel-row.active {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 0.14);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
      transform: scale(1);
      opacity: 1;
    }

    .channel-row .channel-value {
      color: #dfe6f6;
    }

    .channel-row .channel-label {
      display: none;
    }

    .stack {
      display: grid;
      gap: 10px;
    }

    .stack > div:nth-child(3),
    .stack > div:nth-child(4) {
      margin-top: 20px;
    }

    .note-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      position: relative;
    }

    .note-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.07);
      color: rgba(255, 255, 255, 0.9);
      padding: 10px 12px;
      font-size: 13px;
      font-weight: 800;
    }

    .note-chip.low {
      background: rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.9);
    }

    .note-delete {
      border: 0;
      background: rgba(255, 255, 255, 0.08);
      color: inherit;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      font-size: 14px;
      font-weight: 900;
      line-height: 1;
      padding: 0;
    }

    .note-delete.hidden {
      display: none;
    }

    .note-add {
      display: none;
    }

    .note-popup {
      position: absolute;
      left: 50%;
      bottom: calc(100% + 14px);
      transform: translateX(-50%);
      width: min(420px, 92vw);
      background: var(--panel-strong);
      border: 1px solid var(--surface-border);
      border-radius: 18px;
      box-shadow: 0 18px 42px rgba(0, 0, 0, 0.28);
      padding: 14px;
      display: none;
      z-index: 10;
    }

    .note-popup.visible {
      display: grid;
      gap: 10px;
    }

    .note-popup.hidden {
      display: none;
    }

    .note-popup-input {
      width: 100%;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 14px;
      padding: 12px 42px 12px 14px;
      font-size: 18px;
      font-weight: 800;
      color: var(--text);
      background: rgba(255, 255, 255, 0.04);
      outline: none;
    }

    .note-popup-input-wrap {
      position: relative;
    }

    .note-popup-clear {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      border: 0;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.08);
      color: rgba(255, 255, 255, 0.92);
      font-size: 16px;
      font-weight: 900;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .note-popup-hint {
      margin: 0;
      font-size: 14px;
      color: var(--text);
      font-weight: 700;
      line-height: 1.4;
    }

    .note-popup-row {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    .note-popup-button {
      border: 0;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 800;
    }

    .note-popup-button.primary {
      background: rgba(255, 255, 255, 0.12);
      color: white;
    }

    .note-popup-button.secondary {
      background: rgba(255, 255, 255, 0.08);
      color: rgba(255, 255, 255, 0.9);
    }

    .helper {
      margin: 0;
      color: #717986;
      font-size: 14px;
      line-height: 1.55;
    }

    .root-bank {
      display: grid;
      grid-template-columns: repeat(14, minmax(0, 1fr));
      gap: 8px;
      width: 100%;
      box-sizing: border-box;
    }

    .root-bank.top {
      margin-bottom: 4px;
    }

    .root-bank.bottom {
      margin-top: 0;
    }

    .root-bank.bottom .root-key:nth-child(1) { grid-column: 1 / span 2; }
    .root-bank.bottom .root-key:nth-child(2) { grid-column: 3 / span 2; }
    .root-bank.bottom .root-key:nth-child(3) { grid-column: 5 / span 2; }
    .root-bank.bottom .root-key:nth-child(4) { grid-column: 7 / span 2; }
    .root-bank.bottom .root-key:nth-child(5) { grid-column: 9 / span 2; }
    .root-bank.bottom .root-key:nth-child(6) { grid-column: 11 / span 2; }
    .root-bank.bottom .root-key:nth-child(7) { grid-column: 13 / span 2; }

    .root-bank.top .root-key:nth-child(1) { grid-column: 2 / span 2; }
    .root-bank.top .root-key:nth-child(2) { grid-column: 4 / span 2; }
    .root-bank.top .root-key:nth-child(3) { grid-column: 8 / span 2; }
    .root-bank.top .root-key:nth-child(4) { grid-column: 10 / span 2; }
    .root-bank.top .root-key:nth-child(5) { grid-column: 12 / span 2; }

    .root-bank.top .root-key {
      padding: 10px 10px;
      border-radius: 14px;
      font-size: 14px;
      min-width: 0;
    }

    .root-bank.bottom .root-key {
      padding: 12px 8px;
      border-radius: 14px;
    }

    .root-key {
      width: 100%;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      padding: 12px 8px;
      text-align: center;
      font-weight: 800;
      font-size: 14px;
      color: var(--text);
    }

    .set-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 26px;
      max-width: 196px;
      margin-left: auto;
      margin-right: auto;
    }

    .set-button {
      width: 100%;
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 14px;
      background: var(--pad-bg);
      color: var(--text);
      height: 36px;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 0.04em;
      padding: 0 20px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
    }

    .set-button.secondary {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
    }

    .root-key.active {
      background: rgba(255, 255, 255, 0.12);
      color: white;
      border-color: transparent;
      box-shadow: 0 10px 18px rgba(0, 0, 0, 0.18);
    }

    @media (max-width: 900px) {
      body { padding: 14px; }
      .device.landscape { width: 100%; }
      .settings-shell { width: 100%; }
      .editor {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="header">
      <h1 class="title">JChord Mockup</h1>
      <div class="tabs" role="tablist" aria-label="mockup views">
        <button class="tab active" data-target="portrait">Portrait</button>
        <button class="tab" data-target="landscape">Landscape</button>
        <button class="tab" data-target="editor">Code Input</button>
        <button class="tab" data-target="midiInput">MIDI Input</button>
      </div>
    </div>

    <div class="mockup-shell">
      <section class="artboard" data-panel="portrait">
        <div class="device portrait">
          <div class="safe-top">9:41</div>
          <div class="top-label">
            <button class="top-action" type="button">EDIT</button>
            <span class="output-name">MIDI INPUT</span>
            <button class="top-action icon" type="button" aria-label="MIDI settings">⚙</button>
          </div>
          <div class="grid" id="portraitGrid"></div>
          <div class="controls">
            <div class="controls-row">
              <div class="label-line">
                <span>Velocity</span>
              </div>
              <input class="slider" type="range" min="1" max="127" value="100" />
              <div class="velocity-readout">100</div>
            </div>
            <div class="noteoff-wrap">
              <button class="noteoff">OFF</button>
              <button class="noteoff subtle">HOLD</button>
            </div>
          </div>
        </div>
      </section>

      <section class="artboard" data-panel="landscape">
        <div class="device landscape">
          <div class="top-label">
            <button class="top-action" type="button">EDIT</button>
            <span class="output-name">GARAGEBAND</span>
            <button class="top-action icon" type="button" aria-label="MIDI settings">⚙</button>
          </div>
          <div class="grid" id="landscapeGrid"></div>
          <div class="controls">
            <div class="controls-row">
              <div class="label-line">
                <span>Velocity</span>
              </div>
              <input class="slider" type="range" min="1" max="127" value="100" />
              <div class="velocity-readout">100</div>
            </div>
            <div class="noteoff-wrap">
              <button class="noteoff">OFF</button>
              <button class="noteoff subtle">HOLD</button>
            </div>
          </div>
        </div>
      </section>

      <section class="artboard hidden" data-panel="editor">
        <div class="device" style="width: min(1120px, 100%);">
          <div class="editor">
            <div class="editor-card">
              <div class="editor-header">
                <h2 class="editor-title">PAD 01</h2>
              </div>

              <div class="stack">
                <div>
                  <label class="field-label" for="labelInput">LABEL</label>
                  <input id="labelInput" class="text-input" placeholder="[Chord name]" />
                </div>

                <div>
                  <label class="field-label">CANDIDATES</label>
                  <div class="suggestion-list">
                    <button class="suggestion primary">Chrd#01</button>
                    <button class="suggestion">Chrd#02</button>
                    <button class="suggestion">Chrd#03</button>
                    <button class="suggestion">Chrd#04</button>
                    <button class="suggestion">Chrd#05</button>
                    <button class="suggestion">Chrd#06</button>
                    <button class="suggestion">Chrd#07</button>
                    <button class="suggestion">Chrd#08</button>
                    <button class="suggestion">Chrd#09</button>
                  </div>
                </div>

                <div>
                  <label class="field-label">ROOT</label>
                  <div class="root-bank top">
                    <button class="root-key">C#</button>
                    <button class="root-key">D#</button>
                    <button class="root-key">F#</button>
                    <button class="root-key">G#</button>
                    <button class="root-key">A#</button>
                  </div>
                  <div class="root-bank bottom">
                    <button class="root-key">C</button>
                    <button class="root-key active">D</button>
                    <button class="root-key">E</button>
                    <button class="root-key">F</button>
                    <button class="root-key">G</button>
                    <button class="root-key">A</button>
                    <button class="root-key">B</button>
                  </div>
                </div>

                <div>
                  <div class="field-header">
                    <label class="field-label" style="margin:0;">INPUT NOTES</label>
                    <div class="field-actions">
                      <button class="field-action active" id="addModeButton" type="button">ADD</button>
                      <button class="field-action" id="delModeButton" type="button">DEL</button>
                    </div>
                  </div>
                  <div class="note-row">
                    <span class="note-chip low">C3 <button class="note-delete hidden" aria-label="delete note">×</button></span>
                    <span class="note-chip">E3 <button class="note-delete hidden" aria-label="delete note">×</button></span>
                    <span class="note-chip">G3 <button class="note-delete hidden" aria-label="delete note">×</button></span>
                    <span class="note-chip">B3 <button class="note-delete hidden" aria-label="delete note">×</button></span>
                    <span class="note-chip">D4 <button class="note-delete hidden" aria-label="delete note">×</button></span>
                    <div class="note-popup" id="notePopup" aria-hidden="true">
                      <p class="note-popup-hint">Key Input...</p>
                      <div class="note-popup-input-wrap">
                        <input class="note-popup-input" value="C2, C3" />
                        <button class="note-popup-clear" type="button" aria-label="clear captured notes">×</button>
                      </div>
                      <div class="note-popup-row">
                        <button class="note-popup-button secondary" type="button">CANCEL</button>
                        <button class="note-popup-button primary" type="button">ADD</button>
                      </div>
                    </div>
                  </div>
                </div>

                <div class="set-row">
                  <button class="set-button secondary">CANCEL</button>
                  <button class="set-button">SET</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="artboard hidden" data-panel="midiInput">
        <div class="device settings-shell">
          <div class="settings-layout">
            <div class="settings-card">
              <div class="settings-top">
                <div class="segmented">
                  <button class="segment active" type="button" data-midi-source="garageband">GARAGE BAND</button>
                  <button class="segment" type="button" data-midi-source="device">MIDI Device</button>
                </div>
                <div class="device-list">
                  <div class="device-item active" data-midi-source="garageband" id="garagebandDevice">
                    <span>GarageBand</span>
                    <span class="device-meta">connected</span>
                  </div>
                  <div class="device-item" data-midi-source="device" id="usbDevice">
                    <span>USB MIDI Keyboard</span>
                    <span class="device-meta">available</span>
                  </div>
                  <div class="device-item" data-midi-source="device" id="externalDevice">
                    <span>External Interface</span>
                    <span class="device-meta">available</span>
                  </div>
                </div>
              </div>
            </div>

            <div class="settings-grid">
              <div class="settings-card">
                <div class="toggle-row">
                  <div class="test-note-meta">
                    <div class="setting-label">TEST NOTE</div>
                  </div>
                  <div class="segmented">
                    <button class="segment active" type="button">ON</button>
                    <button class="segment" type="button">RESET</button>
                  </div>
                </div>
              </div>

              <div class="settings-card" id="midiChannelCard" hidden>
                <div class="channel-header">
                  <div class="setting-label" style="margin:0;">MIDI CHANNEL</div>
                  <div class="channel-picker" id="channelPicker">
                    <div class="channel-picker-inner">
                      <div class="channel-row active"><span class="channel-value">CH 1</span></div>
                      <div class="channel-row"><span class="channel-value">CH 2</span></div>
                      <div class="channel-row"><span class="channel-value">CH 3</span></div>
                      <div class="channel-row"><span class="channel-value">CH 4</span></div>
                      <div class="channel-row"><span class="channel-value">CH 5</span></div>
                      <div class="channel-row"><span class="channel-value">CH 6</span></div>
                      <div class="channel-row"><span class="channel-value">CH 7</span></div>
                      <div class="channel-row"><span class="channel-value">CH 8</span></div>
                      <div class="channel-row"><span class="channel-value">CH 9</span></div>
                      <div class="channel-row"><span class="channel-value">CH 10</span></div>
                      <div class="channel-row"><span class="channel-value">CH 11</span></div>
                      <div class="channel-row"><span class="channel-value">CH 12</span></div>
                      <div class="channel-row"><span class="channel-value">CH 13</span></div>
                      <div class="channel-row"><span class="channel-value">CH 14</span></div>
                      <div class="channel-row"><span class="channel-value">CH 15</span></div>
                      <div class="channel-row"><span class="channel-value">CH 16</span></div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </div>
  </div>

  <script>
    const pads = [
      { name: "Cmaj9", root: "C" },
      { name: "C#dim7", root: "C#" },
      { name: "Dm9", root: "D" },
      { name: "Ebmaj9", root: "Eb" },
      { name: "Em9", root: "E" },
      { name: "Fmaj9", root: "F" },
      { name: "F#m7b5", root: "F#" },
      { name: "G13", root: "G" },
      { name: "Abmaj9", root: "Ab" },
      { name: "Am9", root: "A" },
      { name: "Bb13", root: "Bb" },
      { name: "Bm7b5", root: "B" }
    ];

    const portraitOrder = [9, 10, 11, 6, 7, 8, 3, 4, 5, 0, 1, 2];
    const landscapeOrder = [1, 3, 5, 7, 9, 11, 0, 2, 4, 6, 8, 10];

    function renderGrid(el, order, cols) {
      el.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
      el.innerHTML = order.map(index => {
        const pad = pads[index];
        return `
          <div class="pad">
            <div class="pad-name">${pad.name}</div>
            <div class="pad-root">${pad.root}</div>
          </div>
        `;
      }).join("");
    }

    renderGrid(document.getElementById("portraitGrid"), portraitOrder, 3);
    renderGrid(document.getElementById("landscapeGrid"), landscapeOrder, 6);

    const tabs = Array.from(document.querySelectorAll(".tab"));
    const panels = Array.from(document.querySelectorAll(".artboard"));

    tabs.forEach(tab => {
      tab.addEventListener("click", () => {
        tabs.forEach(t => t.classList.toggle("active", t === tab));
        const target = tab.dataset.target;
        panels.forEach(panel => {
          const name = panel.dataset.panel;
          panel.classList.toggle("hidden", target !== name);
        });
      });
    });

    const labelInput = document.getElementById("labelInput");
    labelInput.addEventListener("input", () => {
      labelInput.value = labelInput.value.toUpperCase();
    });

    const rootKeys = Array.from(document.querySelectorAll(".root-key"));
    rootKeys.forEach(key => {
      key.addEventListener("click", () => {
        rootKeys.forEach(item => item.classList.remove("active"));
        key.classList.add("active");
      });
    });

    const addModeButton = document.getElementById("addModeButton");
    const delModeButton = document.getElementById("delModeButton");
    const notePopup = document.getElementById("notePopup");
    const notePopupClear = document.querySelector(".note-popup-clear");
    const deleteButtons = Array.from(document.querySelectorAll(".note-delete"));
    let deleteMode = false;

    function setNoteMode(mode, showPopup = false) {
      const isAdd = mode === "add";
      addModeButton.classList.toggle("active", isAdd);
      delModeButton.classList.toggle("active", !isAdd);
      deleteButtons.forEach(button => button.classList.toggle("hidden", isAdd));
      setPopupVisible(isAdd && showPopup);
    }

    function setPopupVisible(visible) {
      notePopup.classList.toggle("visible", visible);
      notePopup.classList.toggle("hidden", !visible);
      notePopup.setAttribute("aria-hidden", String(!visible));
    }

    addModeButton.addEventListener("click", () => {
      deleteMode = false;
      setNoteMode("add", true);
    });
    delModeButton.addEventListener("click", () => {
      deleteMode = !deleteMode;
      setNoteMode(deleteMode ? "del" : "add");
    });
    notePopupClear.addEventListener("click", () => {
      const input = document.querySelector(".note-popup-input");
      input.value = "";
    });
    setPopupVisible(false);
    setNoteMode("add", false);

    const midiSourceButtons = Array.from(document.querySelectorAll("[data-midi-source]"));
    const midiChannelCard = document.getElementById("midiChannelCard");
    const channelRows = Array.from(document.querySelectorAll(".channel-row"));
    const deviceItems = Array.from(document.querySelectorAll(".device-item[data-midi-source]"));
    const garagebandDevice = document.getElementById("garagebandDevice");
    const usbDevice = document.getElementById("usbDevice");
    const externalDevice = document.getElementById("externalDevice");
    const channelPicker = document.getElementById("channelPicker");

    function setMidiSource(mode) {
      midiSourceButtons.forEach(button => {
        if (button.matches(".device-item")) {
          button.classList.toggle("active", button.dataset.midiSource === mode);
        } else if (button.matches(".segment")) {
          button.classList.toggle("active", button.dataset.midiSource === mode);
        }
      });
      midiChannelCard.hidden = mode !== "device";
      garagebandDevice.hidden = mode !== "garageband";
      usbDevice.hidden = mode !== "device";
      externalDevice.hidden = mode !== "device";
      deviceItems.forEach(item => item.classList.toggle("active", item.dataset.midiSource === mode && item === (mode === "garageband" ? garagebandDevice : usbDevice)));
      if (mode === "device") {
        requestAnimationFrame(() => {
          const activeRow = channelRows.find(item => item.classList.contains("active")) || channelRows[0];
          if (activeRow) {
            activeRow.scrollIntoView({ block: "center", behavior: "auto" });
          }
        });
      }
    }

    function setMidiChannel(row) {
      channelRows.forEach(item => item.classList.toggle("active", item === row));
      row.scrollIntoView({ block: "center", behavior: "smooth" });
    }

    midiSourceButtons.forEach(button => {
      button.addEventListener("click", () => setMidiSource(button.dataset.midiSource));
    });

    channelRows.forEach(row => {
      row.addEventListener("click", () => setMidiChannel(row));
    });

    setMidiSource("garageband");
    if (channelRows[0]) {
      channelPicker.scrollTop = 0;
    }
  </script>
</body>
</html>
