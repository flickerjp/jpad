<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>JPad Pad Grid Preview</title>
  <style>
    :root {
      --page-bg: #202020;
      --chrome-bg: #2a2a2a;
      --screen-top: #4a4a4a;
      --screen-bottom: #333333;
      --panel: rgba(255,255,255,.04);
      --panel-border: rgba(255,255,255,.08);
      --text: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.7);
      --pad-top: #4a4a4a;
      --pad-bottom: #2d2d2d;
      --pad-border: rgba(255,255,255,.2);
      --accent-light: #f5ad52;
      --accent-mid: #db7a1a;
      --accent-deep: #ad5705;
      --shadow: 0 22px 64px rgba(0,0,0,.34);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--page-bg);
      color: var(--text);
      display: grid;
      grid-template-rows: auto 1fr;
    }

    body.capture {
      grid-template-rows: 1fr;
    }

    .toolbar {
      padding: 18px 20px 14px;
      border-bottom: 1px solid rgba(255,255,255,.08);
      display: grid;
      gap: 10px;
      background: rgba(0,0,0,.12);
    }

    .toolbar h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 800;
    }

    .toolbar p {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 12px;
      align-items: center;
    }

    .chip {
      padding: 7px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.04);
      font-size: 12px;
      font-weight: 700;
    }

    .viewport {
      display: grid;
      place-items: center;
      padding: 24px;
      overflow: auto;
    }

    body.capture .toolbar {
      display: none;
    }

    body.capture .viewport {
      padding: 12px;
      overflow: hidden;
    }

    .device-frame {
      background: var(--chrome-bg);
      border: 1px solid rgba(255,255,255,.14);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .device-frame.iphone16 {
      width: min(393px, calc(100vw - 48px));
      border-radius: 34px;
      padding: 10px;
    }

    .device-frame.ipad11 {
      width: min(834px, calc(100vw - 48px));
      border-radius: 28px;
      padding: 12px;
    }

    .screen {
      background: linear-gradient(180deg, var(--screen-top), var(--screen-bottom));
      border-radius: 26px;
      padding: 10px 10px 12px;
      display: grid;
      gap: 10px;
    }

    .device-frame.ipad11 .screen {
      border-radius: 20px;
      padding: 14px 14px 16px;
    }

    .status {
      height: 28px;
      display: grid;
      place-items: center;
      color: rgba(255,255,255,.68);
      font-size: 13px;
      font-weight: 700;
    }

    .topbar {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 10px;
      align-items: center;
    }

    .done {
      padding: 8px 14px;
      border-radius: 18px;
      background: linear-gradient(180deg, var(--accent-light), var(--accent-mid) 58%, var(--accent-deep));
      border: 1px solid rgba(219,122,26,.45);
      color: #fff;
      font-size: 12px;
      font-weight: 800;
    }

    .preset {
      min-width: 0;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,.08);
      text-align: center;
      font-size: 15px;
      font-weight: 800;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .gear {
      width: 42px;
      height: 42px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,.82);
      display: grid;
      place-items: center;
      font-size: 18px;
    }

    .pad-grid {
      display: grid;
      gap: 8px;
    }

    .pad-grid.cols-3 { grid-template-columns: repeat(3, 1fr); }
    .pad-grid.cols-4 { grid-template-columns: repeat(4, 1fr); }

    .pad {
      aspect-ratio: 1 / 1;
      border-radius: 16px;
      border: 1.5px solid var(--pad-border);
      background: linear-gradient(145deg, var(--pad-top), var(--pad-bottom));
      padding: 10px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.05);
    }

    .pad-label {
      font-size: 11px;
      font-weight: 700;
      color: rgba(255,255,255,.64);
    }

    .pad-num {
      align-self: center;
      font-size: 34px;
      font-weight: 800;
      line-height: 1;
      letter-spacing: 0;
    }

    .size-compact .pad-num { font-size: 24px; }
    .size-medium .pad-num { font-size: 28px; }
    .size-large .pad-num { font-size: 34px; }

    .size-compact .pad-label { font-size: 10px; }
    .size-medium .pad-label { font-size: 10px; }
    .size-large .pad-label { font-size: 11px; }

    .control-strip {
      display: grid;
      gap: 8px;
    }

    .toggle-row {
      display: flex;
      gap: 18px;
      align-items: center;
      padding: 2px 2px 0;
      font-size: 13px;
      font-weight: 800;
    }

    .toggle {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .radio {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,.86);
      border-radius: 50%;
      display: inline-block;
    }

    .toggle.active .radio::after {
      content: "";
      display: block;
      width: 6px;
      height: 6px;
      margin: 2px;
      border-radius: 50%;
      background: rgba(255,255,255,.96);
    }

    .transport {
      display: grid;
      gap: 8px;
    }

    .transport.compact { grid-template-columns: repeat(2, 1fr); }
    .transport.wide { grid-template-columns: repeat(4, 1fr); }

    .trn {
      min-height: 72px;
      border-radius: 14px;
      border: 1.2px solid rgba(255,255,255,.82);
      padding: 10px 12px;
      display: grid;
      align-content: center;
      gap: 6px;
    }

    .trn.active {
      background: rgba(219,122,26,.26);
      border-color: var(--accent-mid);
    }

    .trn-line {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      font-size: 13px;
      font-weight: 500;
    }

    .trn-value {
      font-size: 17px;
      font-weight: 700;
    }

    .legend {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <h1>JPad Pad Grid Preview</h1>
    <p>URL query: <code>?device=iphone16&mode=3x4-portrait</code> / <code>3x4-landscape</code> / <code>4x4-portrait</code> / <code>4x4-landscape</code></p>
    <div class="controls">
      <div class="chip" id="chip-device"></div>
      <div class="chip" id="chip-mode"></div>
      <div class="chip" id="chip-grid"></div>
      <div class="chip" id="chip-rule"></div>
    </div>
  </div>

  <div class="viewport">
    <div class="device-frame" id="device-frame">
      <div class="screen">
        <div class="status" id="status-label"></div>
        <div class="topbar">
          <div class="done" id="done-label">DONE</div>
          <div class="preset" id="preset-label">Classic Hard</div>
          <div class="gear">⚙</div>
        </div>
        <div class="pad-grid" id="pad-grid"></div>
        <div class="control-strip">
          <div class="toggle-row">
            <div class="toggle"><span class="radio"></span><span>SLIDER</span></div>
            <div class="toggle active"><span class="radio"></span><span>TRANSPOSE</span></div>
          </div>
          <div class="transport" id="transport-row">
            <div class="trn active">
              <div class="trn-line"><span>KEY</span><span class="trn-value">+2</span></div>
              <div class="trn-line"><span>OCT</span><span class="trn-value">0</span></div>
            </div>
            <div class="trn">
              <div class="trn-line"><span>KEY</span><span class="trn-value">0</span></div>
              <div class="trn-line"><span>OCT</span><span class="trn-value">0</span></div>
            </div>
            <div class="trn extra">
              <div class="trn-line"><span>KEY</span><span class="trn-value">-5</span></div>
              <div class="trn-line"><span>OCT</span><span class="trn-value">+1</span></div>
            </div>
            <div class="trn extra">
              <div class="trn-line"><span>KEY</span><span class="trn-value">0</span></div>
              <div class="trn-line"><span>OCT</span><span class="trn-value">0</span></div>
            </div>
          </div>
        </div>
        <div class="legend" id="legend"></div>
      </div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const device = params.get('device') || 'iphone16';
    const mode = params.get('mode') || '3x4-portrait';
    const capture = params.get('capture') === '1';

    const configs = {
      '3x4-portrait': {
        title: '3x4 Portrait',
        status: 'iPhone Portrait',
        done: 'DONE',
        preset: 'Classic Hard',
        cols: 3,
        size: 'large',
        transport: 'compact',
        legend: '3x4 の基準状態。左下 01、右上 12。',
        pads: ['10','11','12','07','08','09','04','05','06','01','02','03']
      },
      '3x4-landscape': {
        title: '3x4 Landscape',
        status: 'Landscape / 4x3',
        done: 'EDIT',
        preset: 'Classic Hard',
        cols: 4,
        size: 'medium',
        transport: 'wide',
        legend: '横向き候補。4x3 表示で左下 01、右上 12。',
        pads: ['09','10','11','12','05','06','07','08','01','02','03','04']
      },
      '4x4-portrait': {
        title: '4x4 Portrait',
        status: 'Portrait / 4x4',
        done: 'DONE',
        preset: '4x4 Sketch',
        cols: 4,
        size: 'medium',
        transport: 'compact',
        legend: '16 パッド案。縦向きでも左下 01、右上 16。',
        pads: ['13','14','15','16','09','10','11','12','05','06','07','08','01','02','03','04']
      },
      '4x4-landscape': {
        title: '4x4 Landscape',
        status: 'Landscape / 4x4',
        done: 'EDIT',
        preset: '4x4 Sketch',
        cols: 4,
        size: 'compact',
        transport: 'wide',
        legend: '16 パッドの横向き案。コントロールとの干渉を確認するための圧縮状態。',
        pads: ['13','14','15','16','09','10','11','12','05','06','07','08','01','02','03','04']
      }
    };

    const config = configs[mode] || configs['3x4-portrait'];
    const isIPad = device === 'ipad11';

    if (capture) {
      document.body.classList.add('capture');
    }

    const frame = document.getElementById('device-frame');
    frame.classList.add(isIPad ? 'ipad11' : 'iphone16');

    document.getElementById('chip-device').textContent = isIPad ? 'Device: iPad 11-inch' : 'Device: iPhone 16';
    document.getElementById('chip-mode').textContent = `Mode: ${config.title}`;
    document.getElementById('chip-grid').textContent = `Grid: ${config.cols} cols`;
    document.getElementById('chip-rule').textContent = 'Rule: left-bottom min / right-top max';

    document.getElementById('status-label').textContent = isIPad ? `iPad 11-inch / ${config.status}` : `iPhone 16 / ${config.status}`;
    document.getElementById('done-label').textContent = config.done;
    document.getElementById('preset-label').textContent = config.preset;
    document.getElementById('legend').textContent = config.legend;

    const grid = document.getElementById('pad-grid');
    grid.classList.add(`cols-${config.cols}`, `size-${config.size}`);

    const transport = document.getElementById('transport-row');
    transport.classList.add(config.transport);
    if (config.transport === 'compact') {
      transport.querySelectorAll('.extra').forEach((node) => node.remove());
    }

    config.pads.forEach((num) => {
      const pad = document.createElement('div');
      pad.className = 'pad';
      pad.innerHTML = `<div class="pad-label">PAD ${num}</div><div class="pad-num">${num}</div>`;
      grid.appendChild(pad);
    });
  </script>
</body>
</html>
